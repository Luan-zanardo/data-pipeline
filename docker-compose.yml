# =============================================================================
# Etapa 3 — Orquestração e Camada Landing (Issue #5)
# Apache Airflow (LocalExecutor) em Docker.
# NÃO usa cron do Linux nem Agendador do Windows: o scheduling é do Airflow.
# =============================================================================

x-airflow-common: &airflow-common
  # Em vez de usar uma imagem pronta, construímos a nossa própria a partir
  # do Dockerfile presente neste diretório.
  build: .
  environment: &airflow-common-env
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@airflow-metadata:5432/airflow
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "true"
    AIRFLOW__SCHEDULER__ENABLE_HEALTH_CHECK: "true"
    PYTHONPATH: /opt/airflow/src
    # Dependências do Spark (JARs): Delta Lake, driver JDBC do Postgres e suporte a S3
    AIRFLOW__SPARK__PACKAGES: "io.delta:delta-spark_2.12:3.2.0,org.postgresql:postgresql:42.7.3,org.apache.hadoop:hadoop-aws:3.3.4"
    # Conexão com o banco de ORIGEM (lida do .env).
    SOURCE_DB_HOST: ${SOURCE_DB_HOST}
    SOURCE_DB_PORT: ${SOURCE_DB_PORT}
    SOURCE_DB_NAME: ${SOURCE_DB_NAME}
    SOURCE_DB_USER: ${SOURCE_DB_USER}
    SOURCE_DB_PASSWORD: ${SOURCE_DB_PASSWORD}
    SOURCE_DB_SSLMODE: ${SOURCE_DB_SSLMODE}
    # Conexão com o banco de DESTINO (lida do .env).
    DEST_DB_HOST: ${DEST_DB_HOST}
    DEST_DB_PORT: ${DEST_DB_PORT}
    DEST_DB_NAME: ${DEST_DB_NAME}
    DEST_DB_USER: ${DEST_DB_USER}
    DEST_DB_PASSWORD: ${DEST_DB_PASSWORD}
    DEST_DB_SSLMODE: ${DEST_DB_SSLMODE}
    # Destino da Landing no Data Lake (MinIO).
    LANDING_PATH: ${LANDING_PATH:-s3://datalake/landing}
    # Object storage do Data Lake (MinIO).
    S3_ENDPOINT_URL: ${S3_ENDPOINT_URL:-http://minio:9000}
    AWS_ACCESS_KEY_ID: ${MINIO_ROOT_USER:-minioadmin}
    AWS_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
  volumes:
    - ./dags:/opt/airflow/dags
    - ./src:/opt/airflow/src
    - ./datalake:/opt/airflow/datalake
    - ./logs:/opt/airflow/logs
  user: "${AIRFLOW_UID:-50000}:0"
  depends_on:
    airflow-metadata:
      condition: service_healthy

services:
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    entrypoint:
      - /bin/sh
      - -c
      - |
        until mc alias set local http://minio:9000 "$$MINIO_ROOT_USER" "$$MINIO_ROOT_PASSWORD"; do
          echo "aguardando o MinIO subir..."; sleep 2;
        done
        mc mb --ignore-existing local/datalake
        echo "Bucket 'datalake' pronto (camada Landing em datalake/landing/)."

  airflow-metadata:
    image: postgres:16
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - airflow-metadata-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 10s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  airflow-init:
    <<: *airflow-common
    entrypoint: /bin/bash
    command:
      - -c
      - |
        airflow db migrate
        airflow users create \
          --username "${AIRFLOW_ADMIN_USER:-admin}" \
          --password "${AIRFLOW_ADMIN_PASSWORD:-admin}" \
          --firstname Admin --lastname Pipeline \
          --role Admin --email admin@example.com || true
    restart: on-failure

  airflow-webserver:
    <<: *airflow-common
    command: webserver
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    depends_on:
      airflow-metadata:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully
      minio-init:
        condition: service_completed_successfully

  airflow-scheduler:
    <<: *airflow-common
    command: scheduler
    restart: unless-stopped
    depends_on:
      airflow-metadata:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully
      minio-init:
        condition: service_completed_successfully

  # ---- Etapa 6 — Dataviz (Metabase) ----------------------------------------
  metabase-db:
    image: postgres:16
    environment:
      POSTGRES_DB: ${MB_DB_NAME:-metabase}
      POSTGRES_USER: ${MB_DB_USER:-metabase}
      POSTGRES_PASSWORD: ${MB_DB_PASSWORD:-metabase}
    volumes:
      - metabase-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${MB_DB_USER:-metabase}"]
      interval: 10s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  metabase:
    image: metabase/metabase:latest
    ports:
      - "3000:3000"
    environment:
      MB_DB_TYPE: postgres
      MB_DB_DBNAME: ${MB_DB_NAME:-metabase}
      MB_DB_USER: ${MB_DB_USER:-metabase}
      MB_DB_PASS: ${MB_DB_PASSWORD:-metabase}
      MB_DB_HOST: metabase-db
      MB_DB_PORT: 5432
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:3000/api/health"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s
    restart: unless-stopped
    depends_on:
      metabase-db:
        condition: service_healthy

volumes:
  airflow-metadata-data:
  minio-data:
  metabase-db-data:
