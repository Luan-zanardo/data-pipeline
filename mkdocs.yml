site_name: Pipeline de Dados - Documentação
site_url: https://Luan-zanardo.github.io/data-pipeline/
repo_url: https://github.com/Luan-zanardo/data-pipeline
repo_name: Luan-zanardo/data-pipeline
edit_uri: edit/main/docs/

theme:
  name: material
  palette:
    # Palette toggle for light mode
    - scheme: default
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode

    # Palette toggle for dark mode
    - scheme: slate
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - toc.integrate
    - navigation.top
    - search.suggest
    - search.highlight
    - content.tabs.link
    - content.code.annotation
    - content.code.copy
  language: en
  icon:
    repo: fontawesome/brands/github-alt

# Navigation structure based on the documentation files created
nav:
  - 'Início': 'index.md'
  - 'Arquitetura': 'arquitetura.md'
  - 'Fluxo do Pipeline': 'pipeline.md'
  - 'Modelo Dimensional': 'modelo_dimensional.md'
  - 'Setup e Execução': 'setup.md'

# Specs internos de design não fazem parte do site publicado.
exclude_docs: |
  superpowers/

# Extensions
markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.mark
  - attr_list
  - md_in_html
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg