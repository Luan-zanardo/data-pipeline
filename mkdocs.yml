site_name: Data Pipeline
site_description: Pipeline de dados com arquitetura medalhão (Landing → Bronze → Silver → Gold)
theme:
  name: material
  language: pt
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
  features:
    - navigation.sections
    - navigation.top
    - content.code.copy

nav:
  - Início: index.md
  - Arquitetura: arquitetura.md
  - Modelo de Dados: modelo-dados.md
  - Etapas do Projeto: etapas.md
  - Pipeline:
      - Geração de Massa: geracao-massa.md
      - Orquestração e Landing: orquestracao.md
      - Bronze e Silver: bronze-silver.md
      - Gold: gold.md
  - Como Executar: como-executar.md
  - Entrega: entrega.md

markdown_extensions:
  - admonition
  - tables
  - pymdownx.highlight
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
