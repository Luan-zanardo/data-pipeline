site_name: Data Pipeline
site_description: Pipeline de dados com arquitetura medalhão (Landing → Bronze → Silver → Gold)
theme:
  name: material
  language: pt
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
  features:
    - navigation.sections
    - navigation.top
    - content.code.copy

nav:
  - Início: index.md
  - Arquitetura: arquitetura.md
  - Etapas do Projeto: etapas.md
  - Como Executar: como-executar.md
  - Entrega: entrega.md

markdown_extensions:
  - admonition
  - tables
  - pymdownx.highlight
  - pymdownx.superfences
